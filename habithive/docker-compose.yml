version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: habithive
      POSTGRES_PASSWORD: habithive
      POSTGRES_DB: habithive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habithive"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - apps/web/.env
    environment:
      DATABASE_URL: postgresql://habithive:habithive@postgres:5432/habithive
      REDIS_URL: redis://redis:6379

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file:
      - apps/realtime/.env
    environment:
      DATABASE_URL: postgresql://habithive:habithive@postgres:5432/habithive
      REDIS_URL: redis://redis:6379

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - apps/worker/.env
    environment:
      DATABASE_URL: postgresql://habithive:habithive@postgres:5432/habithive
      REDIS_URL: redis://redis:6379

volumes:
  pgdata:
